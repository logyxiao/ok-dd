    git_url: "https://github.com/your-name/ok-dingtalk.git"
    main_script: "main.py"
    requires_python: "3.12"
    requirements: "requirements.txt"
    use_pythonw: true
    show_add_defender: true
  - name: "Panel"
    git_url: "https://github.com/your-name/ok-dingtalk.git"
    main_script: "scripts/dingtalk_gui.py"
    requires_python: "3.12"
    requirements: "requirements.txt"
    use_pythonw: true
  - name: "Debug"
    git_url: "https://github.com/your-name/ok-dingtalk.git"
    main_script: "main_debug.py"
    requires_python: "3.12"
    requirements: "requirements.txt"
